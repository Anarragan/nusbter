version: '3.9'
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: nubster-api:latest
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3000}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      ENABLE_SWAGGER: ${ENABLE_SWAGGER:-false}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:' + (process.env.PORT || 3000) + '/api/songs/metrics').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    mem_limit: 512m
    cpus: 0.75
    volumes:
      - api-cache:/app/.cache

  redis:
    image: redis:7-alpine
    container_name: nubster-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  api-cache:
  redis-data:
